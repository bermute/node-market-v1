name: Node CI

on:
  pull_request:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 의존성 설치
        run: npm install

      - name: 문법 체크 (Node 실행 테스트)
        run: node -e "require('./app')"

      # 테스트가 있다면 활성화
      # - name: 테스트 실행
      #   run: npm test